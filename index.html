<!DOCTYPE html>
<html>

<head>
    <title>10 Punishments</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="island"></div>

    <div class="container">

        <h3 class="top-heading">RELATIONSHIP COURT</h3>

        <h1>Your overall behaviour ❤️</h1>

        <div class="slider-box">

            <span class="emoji">☹️</span>

            <input
                type="range"
                min="-10"
                max="10"
                value="0"
                step="1"
                id="slider">

            <span class="emoji">😊</span>

        </div>

        <div class="numbers">
            <span>-10</span>
            <span>-8</span>
            <span>-6</span>
            <span>-4</span>
            <span>-2</span>
            <span>0</span>
            <span>+2</span>
            <span>+4</span>
            <span>+6</span>
            <span>+8</span>
            <span>+10</span>
        </div>

        <h2 id="value">0%</h2>

        <p id="punishment">No punishment 🙂</p>

    </div>

    <script src="script.js"></script>

</body>

</html>
